naftiko: "1.0.0-alpha1"

info:
  label: "Amazon CloudWatch"
  description: "API for publishing metrics, creating alarms, managing dashboards, querying logs, and configuring observability for AWS resources and applications."
  tags:
    - Amazon Web Services
    - Amazon CloudWatch
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
      AWS_REGION: AWS_REGION

capability:
  consumes:
    - type: http
      namespace: cloudwatch
      baseUri: https://monitoring.us-east-1.amazonaws.com
      description: "Amazon CloudWatch API."
      authentication:
        type: apikey
        key: Authorization
        value: "{{AWS_ACCESS_KEY_ID}}"
        placement: header
      resources: []

  exposes:
    - type: rest
      port: 8100
      namespace: cloudwatch-rest
      resources: []

    - type: mcp
      port: 9100
      namespace: cloudwatch-mcp
      transport: http
      tools: []
