naftiko: "1.0.0-alpha1"

info:
  label: "Amazon CloudWatch Observability and Monitoring"
  description: "Workflow for observability and monitoring using Amazon CloudWatch for Operations Engineer personas."
  tags:
    - Amazon Web Services
    - Amazon CloudWatch
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
      AWS_REGION: AWS_REGION

capability:
  consumes:
    - import: cloudwatch
      location: ./shared/cloudwatch.yaml

  exposes:
    - type: rest
      port: 8080
      namespace: cloudwatch-workflow-api
      description: "Unified REST API for Amazon CloudWatch observability and monitoring."
      resources: []

    - type: mcp
      port: 9090
      namespace: cloudwatch-workflow-mcp
      transport: http
      description: "MCP server for AI-assisted Amazon CloudWatch observability and monitoring."
      tools: []
