vocabulary: "1.0.0"

info:
  provider: "Amazon CloudWatch"
  description: "Vocabulary for Amazon CloudWatch APIs covering operations, schemas, and capability workflows."
  created: "2026-04-19"
  modified: "2026-04-19"

operational:
  apis:
    - name: "Amazon CloudWatch API"
      namespace: cloudwatch
      baseUrl: https://monitoring.us-east-1.amazonaws.com
      status: active

  resources: []
  actions:
    - name: list
      httpMethod: GET
      pattern: read
    - name: create
      httpMethod: POST
      pattern: write
    - name: get
      httpMethod: GET
      pattern: read
    - name: delete
      httpMethod: DELETE
      pattern: destructive

  authentication:
    schemes:
      - type: AWS Signature Version 4
        apis: [cloudwatch]

capability:
  workflows:
    - name: "Observability and Monitoring"
      file: capabilities/observability.yaml
      toolCount: 8
      personas: [Operations Engineer]

  personas:
    - id: operations-engineer
      name: "Operations Engineer"
      workflows: ["Observability and Monitoring"]

  namespaces:
    - name: cloudwatch
      type: consumed
      baseUri: https://monitoring.us-east-1.amazonaws.com
    - name: cloudwatch-workflow-api
      type: rest-exposed
      port: 8080
    - name: cloudwatch-workflow-mcp
      type: mcp-exposed
      port: 9090

  binds:
    - name: AWS_ACCESS_KEY_ID
      workflows: ["Observability and Monitoring"]
    - name: AWS_SECRET_ACCESS_KEY
      workflows: ["Observability and Monitoring"]

crossReference: []
