    registry: npm
    name: "@aws-sdk/client-cloudwatch"
    url: https://www.npmjs.com/package/@aws-sdk/client-cloudwatch
    install: npm install @aws-sdk/client-cloudwatch
    official: true
  - language: python
    registry: pypi
    name: boto3
    url: https://pypi.org/project/boto3/
    install: pip install boto3
    official: true
  - language: python
    registry: pypi
    name: botocore
    url: https://pypi.org/project/botocore/
    install: pip install botocore
    official: true
  - language: java
    registry: maven
    name: software.amazon.awssdk:cloudwatch
    url: https://central.sonatype.com/artifact/software.amazon.awssdk/cloudwatch
    install: "implementation 'software.amazon.awssdk:cloudwatch'"
    official: true
  - language: dotnet
    registry: nuget
    name: AWSSDK.CloudWatch
    url: https://www.nuget.org/packages/AWSSDK.CloudWatch
    install: dotnet add package AWSSDK.CloudWatch
