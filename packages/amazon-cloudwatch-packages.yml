    url: https://packagist.org/packages/aws/aws-sdk-php
    install: composer require aws/aws-sdk-php
    official: true
  - language: rust
    registry: crates.io
    name: aws-sdk-cloudwatch
    url: https://crates.io/crates/aws-sdk-cloudwatch
    install: cargo add aws-sdk-cloudwatch
    official: true
  - language: cli
    registry: pypi
