method: searched
source: https://aws.amazon.com/developer/tools/
description: >-
  First-party AWS SDK client libraries that ship a dedicated CloudWatch service
  client, plus the AWS CLI. CloudWatch is accessed through the standard AWS SDKs;
  each language SDK exposes a CloudWatch client generated from the same service
  model as the OpenAPI in this repo.
packages:
